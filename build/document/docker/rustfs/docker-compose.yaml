services:
  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.73
    container_name: rustfs-1.0.0-alpha.73
    security_opt:
      - "no-new-privileges:true"
    ports:
      # S3 API 对外端口
      - "10000:9000"
      # 控制台对外端口
      - "10001:9001"
    environment:
      # 数据卷（多个路径用逗号分隔）
      - RUSTFS_VOLUMES=/data/rustfs{0...3}
      # API 和控制台监听地址
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      # 外部端口映射 10000 -> 9000
      - RUSTFS_EXTERNAL_ADDRESS=:10000
      # CORS 设置，控制台与 S3 API 都放开来源
      - RUSTFS_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*
      # 访问密钥（生产环境请修改为强密码）
      - RUSTFS_ACCESS_KEY=fyy
      - RUSTFS_SECRET_KEY=fyyain77
      # 日志级别
      - RUSTFS_OBS_LOGGER_LEVEL=info
      - RUSTFS_OBS_LOG_DIRECTORY=/logs

    volumes:
      # 存储数据卷（请根据实际情况修改路径）
      - ./data:/data
      # 日志目录
      - ./logs:/app/logs

    networks:
      - rustfs-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "sh", "-c",
          "curl -f http://localhost:9000/health && curl -f http://localhost:9001/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  rustfs-network:
    driver: bridge