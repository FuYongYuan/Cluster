server:
  port: 8081

spring:
  application:
    name: seata-namingserver

logging:
  config: classpath:logback-spring.xml
  file:
    path: ${log.home:${user.home}/logs/seata}

heartbeat:
  # Heartbeat timeout threshold (milliseconds)
  threshold: 90000
  # Heartbeat period (milliseconds)
  period: 60000

seata:
  security:
    # JWT secret key (must be Base64 encoded, generated with openssl rand -base64 32)
    secretKey: SeataSecretKey0c382ef121d778043159209298fd40bf3850a017
    # Token validity period (milliseconds)
    tokenValidityInMilliseconds: 1800000
    # CSRF ignored URLs
    csrf-ignore-urls: /naming/v1/**,/api/v1/naming/**
    ignore:
      urls: /,/**/*.css,/**/*.js,/**/*.html,/**/*.map,/**/*.svg,/**/*.png,/**/*.jpeg,/**/*.ico,/api/v1/auth/login,/version.json,/naming/v1/health,/error

# Console account configuration
console:
  user:
    # Console login username, default: seata
    username: fyy
    # Console login password, leave blank for auto-generated random password
    password: fyyain77
